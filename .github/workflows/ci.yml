name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - run: go vet ./...
      - run: go test -race ./...

      # The manifest's build command is what `herdr plugin install` runs, so a
      # break there is a broken install even when the tests pass.
      - name: build as the plugin manifest does
        run: go build -o bin/herdr-phin-board ./cmd/herdr-phin-board
