name: release

# Every push to main republishes a rolling "latest" release, so someone without
# Go on their machine can still install the plugin. Tagged pushes (v1.2.3) cut
# a permanent release alongside it.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          name="herdr-phin-board-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w" -o "dist/${name}" ./cmd/herdr-phin-board
          (cd dist && shasum -a 256 "${name}" > "${name}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: publish rolling latest
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Drop the old release and its tag, then recreate both against this
          # commit -- gh creates the tag from --target.
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest dist/* \
            --title "latest (${GITHUB_SHA::7})" \
            --notes "Rolling build of main. Binaries for macOS and Linux; verify with the matching .sha256." \
            --prerelease \
            --target "$GITHUB_SHA"

      - name: publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
