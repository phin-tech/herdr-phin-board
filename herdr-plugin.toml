id = "phin-board"
name = "Phin Board"
version = "0.2.0"
min_herdr_version = "0.7.5"
description = "A status board over your spaces: todo, in progress, waiting on someone, done — plus any status you invent."
platforms = ["macos", "linux"]

[[build]]
# Compiles from source when Go is present, else fetches the CI-built binary.
command = ["sh", "build.sh"]

[[actions]]
id = "open"
title = "Open Phin Board"
contexts = ["global", "workspace"]
command = ["sh", "action-open.sh"]

[[panes]]
id = "phin-board"
title = "Board"
placement = "popup"
width = "80%"
height = "85%"
# Pane commands are resolved against PATH, not the plugin root, so the binary
# has to be named absolutely via the injected plugin root.
command = ["sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-phin-board"']

# Runs once after the server restores a session, and again after a live
# handoff. Reapplies the $status badges, which do not survive a restart, and
# starts the background watcher -- so pull request notifications arrive whether
# or not the board has ever been opened. Requires Herdr 0.7.5.
[[startup]]
command = ["sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-phin-board" startup']

# A workspace opened later was not there at startup, so it needs its badge too.
[[events]]
on = "workspace.created"
command = ["sh", "-c", 'exec "$HERDR_PLUGIN_ROOT/bin/herdr-phin-board" sync']
